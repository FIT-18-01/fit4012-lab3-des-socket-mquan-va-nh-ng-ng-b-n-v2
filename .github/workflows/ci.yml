name: fit4012-lab3-ci

on:
  push:
  pull_request:

jobs:
  verify-submission:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Disabled automatic pip cache lookup because some student submissions
          # put project files in a nested directory which can make the cache
          # action fail when it cannot find requirements.txt or pyproject.toml.
          # Remove or re-enable if your repo has a top-level requirements file.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Try to find a requirements.txt anywhere near the repo root (handles submissions
          # that include a nested project directory). If found, install from it. If not,
          # look for pyproject.toml as a fallback. If neither exists, continue so the
          # workflow can still run the submission checks (which may not need extra deps).
          REQ=$(find . -maxdepth 4 -type f -name 'requirements.txt' -print -quit || true)
          if [ -n "$REQ" ]; then
            echo "Found requirements file: $REQ"
            pip install -r "$REQ"
          else
            PY=$(find . -maxdepth 4 -type f -name 'pyproject.toml' -print -quit || true)
            if [ -n "$PY" ]; then
              echo "Found pyproject.toml: $PY"
              python -m pip install --upgrade pip
              python -m pip install poetry
              (cd "$(dirname "$PY")" && poetry install)
            else
              echo "No requirements.txt or pyproject.toml found; skipping dependency install."
            fi
          fi

      - name: Static syntax check
        run: |
          python -m py_compile sender.py receiver.py des_socket_utils.py

      - name: Submission contract check
        run: bash .github/scripts/check_submission.sh

      - name: Run tests
        run: pytest -q
